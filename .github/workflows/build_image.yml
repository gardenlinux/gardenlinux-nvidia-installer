name: Build and Publish Container Images (matrix)

on:
  workflow_call:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  id-token: write
  packages: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
      manifest_matrix: ${{ steps.set-matrix.outputs.manifest_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML and jq
        run: |
          pip install pyyaml
          sudo apt-get install -y jq

      - name: Generate build and manifest matrices
        id: set-matrix
        run: |
          MATRIX_JSON=$(python3 .ci/generate_matrix.py)
          echo "build_matrix=$(echo "$MATRIX_JSON" | jq -c '.image')" >> $GITHUB_OUTPUT
          echo "manifest_matrix=$(echo "$MATRIX_JSON" | jq -c '.manifest')" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build_matrix) }}
    env:
      GL_VERSION: ${{ matrix.os_version }}
      DRIVER_VERSION: ${{ matrix.driver_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase github.repository
        run: echo "FOLDER_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name as lower case
        shell: bash
        run: echo BRANCH_FOLDER=$(echo "/${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | grep -v ^/main$ | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
        id: extract_branch

      - name: Build and push Docker image
        id: build_image
        run: |
          IMAGE_PATH="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/driver"
          TAG=$(make build-image \
          GL_VERSION=$GL_VERSION \
          DRIVER_VERSION=$DRIVER_VERSION \
          RELEASE_TAG=${{ github.ref_name }} \
          IMAGE_PATH=${IMAGE_PATH})

          TAG1=$(echo "$TAG" | sed -n 1p)
          TAG2=$(echo "$TAG" | sed -n 2p)
          TAG3=$(echo "$TAG" | sed -n 3p)

          docker push $IMAGE_PATH:$TAG1
          docker push $IMAGE_PATH:$TAG2
          docker push $IMAGE_PATH:$TAG3

  manifest:
    needs: [build, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.manifest_matrix) }}
    env:
      IMAGE_NAME: "driver"
      GL_VERSION: ${{ matrix.os_version }}
      DRIVER_VERSION: ${{ matrix.driver_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase github.repository
        run: echo "FOLDER_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Extract branch name as lower case
        shell: bash
        run: echo BRANCH_FOLDER=$(echo "/${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | grep -v ^/main$ | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
        id: extract_branch

      - name: Create and push multi-arch manifest
        run: |
          DRIVER_MAJOR_VERS="${{ matrix.driver_version }}"
          DRIVER_MAJOR_VERS="${DRIVER_MAJOR_VERS%%.*}"
          MANIFEST_TAG="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${{ env.IMAGE_NAME }}:${DRIVER_MAJOR_VERS}-gardenlinux${{ matrix.os_version }}"
          AMD64_IMAGE="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${{ env.IMAGE_NAME }}:${DRIVER_MAJOR_VERS}-amd64-gardenlinux${{ matrix.os_version }}"
          #ARM64_IMAGE="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${{ env.IMAGE_NAME }}:${DRIVER_MAJOR_VERS}-arm64-gardenlinux${{ matrix.os_version }}"

          docker manifest create $MANIFEST_TAG $AMD64_IMAGE
          #docker manifest create $MANIFEST_TAG $AMD64_IMAGE $ARM64_IMAGE
          docker manifest push $MANIFEST_TAG
