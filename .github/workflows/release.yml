name: Release
on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-image:
    uses: ./.github/workflows/build_image.yml

  update-helm-values:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: resolve-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            TAG=$(gh release list --repo "${{ github.repository }}" --json tagName \
              --jq '[.[] | select(.tagName | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName')
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Update driver.repository in gpu-operator-values.yaml
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          sed -i "s|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/.*|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/${TAG}|" \
            helm/gpu-operator-values.yaml

      - name: Update release tag in README.md
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          # Replace every refs/tags/<version> URL and the inline image path example
          sed -i \
            -E "s|(refs/tags/)[0-9]+\.[0-9]+\.[0-9]+|\1${TAG}|g" \
            README.md
          # Replace the inline example path segment (e.g. /1.0.4/driver:)
          sed -i \
            -E "s|(gardenlinux-nvidia-installer/)[0-9]+\.[0-9]+\.[0-9]+(/driver)|\1${TAG}\2|g" \
            README.md

      - name: Update supported versions table in README.md
        run: |
          # Capture the output of list_versions.py
          VERSIONS_OUTPUT="$(python3 list_versions.py)"

          # Replace the content between the sentinel comments in README.md
          awk -v new_content="${VERSIONS_OUTPUT}" '
            /<!-- list_versions_output_start -->/ {
              print
              print "```"
              print new_content
              print "```"
              in_block = 1
              next
            }
            /<!-- list_versions_output_end -->/ {
              in_block = 0
              print
              next
            }
            in_block { next }
            { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Commit and push
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          
          git config user.name "Garden Linux Builder"
          git config user.email "gardenlinux@users.noreply.github.com"

          git checkout -b update-readme tags/${TAG}

          git add helm/gpu-operator-values.yaml README.md
          git diff --cached --quiet || git commit -m "Update release references for ${TAG}"

          git push --set-upstream origin update-readme
          UPDATE_PR_LINK=$(gh pr create --base main --head update-history --title 'Update README.md for release ${TAG}' --body "automated update")

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
