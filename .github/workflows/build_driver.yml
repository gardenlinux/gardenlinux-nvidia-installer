name: Build Drivers (non-container artifacts)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate matrix
        id: set-matrix
        run: |
          MATRIX_JSON="$(python3 .ci/generate_matrix.py)"
          echo "matrix=$(echo "$MATRIX_JSON" | jq -c '.build')" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    env:
      TARGET_ARCH: ${{ matrix.arch }}
      GL_VERSION: ${{ matrix.os_version }}
      DRIVER_VERSION: ${{ matrix.driver_version }}
      KERNEL_FLAVOR: ${{ matrix.kernel_flavour }}
      KERNEL_TYPE: ${{ matrix.kernel_type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Compile module 
        run: |
          make build-driver WORKSPACE_DIR="${{ github.workspace }}" \
             KERNEL_FLAVOR=$KERNEL_FLAVOR \
             TARGET_ARCH=$TARGET_ARCH \
             GL_VERSION=$GL_VERSION \
             DRIVER_VERSION=$DRIVER_VERSION \
             KERNEL_TYPE=$KERNEL_TYPE \
             RELEASE_TAG=${{ github.ref_name }}

      - name: Publish tarball to GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On a tag build github.ref_name is the tag (e.g. "v1.2.3").
          # On a branch build it is the branch name (e.g. "main").
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Create the release if it does not yet exist; ignore error if it already does.
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes "Pre-compiled kernel module tarballs for NVIDIA driver ${DRIVER_VERSION}" \
            --repo "${{ github.repository }}" \
            2>/dev/null || true
          # Upload every tarball produced for this matrix cell (may be one file).
          for tarball in ${{ github.workspace }}/out/nvidia/driver-${DRIVER_VERSION}-${KERNEL_TYPE}-*.tar.gz; do
            gh release upload "${RELEASE_TAG}" "${tarball}" \
              --clobber \
              --repo "${{ github.repository }}"
          done

  check-complete:
    name: Pull Request Check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    needs: build
    steps:
      - name: Ensure all matrix jobs passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more build jobs failed."
            exit 1
          fi
