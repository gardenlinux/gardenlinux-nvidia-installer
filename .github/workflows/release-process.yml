name: Release process

on:
  pull_request:
    branches: [main]
    types: [closed]
    paths-ignore:
    # Don't trigger on changes to files that are updated in a separate PR after the release is created
      - 'helm/**'
      - 'README*.md'
      - 'release-version.yaml'
    # Don't trigger on changes to GitHub or CI files, as these do not lead to updated or additional images
      - '.github/**'
      - '.ci/**'
      - 'cdup/**'
    # Don't trigger on documentation changes
      - 'docs/**'
      - '*.md'

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  determine-version:
    if: github.event.pull_request.merged == true # Only run if the PR was merged - needed to avoid creating a release for every PR that is closed without merging
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine new semver tag
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          source .ci/semver.sh
          bump_semver

  update-files:
    needs: determine-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use a token that allows pushing to protected branches if needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml
       
      - name: Update driver.repository in gpu-operator-values.yaml
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          sed -i "s|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/.*|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/${TAG}|" \
            helm/gpu-operator-values.yaml
      
      - name: Update driver.repository in gpu-operator-values-runtime.yaml
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          sed -i "s|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/.*|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/${TAG}|" \
            helm/gpu-operator-values-runtime.yaml

      - name: Update driver.repository in gpu-operator-gvisor-values.yaml
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          sed -i "s|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/.*/gvisor|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/${TAG}/gvisor|" \
            helm/gpu-operator-gvisor-values.yaml

      - name: Update release tag in README.md
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          # Replace every refs/tags/<version> URL and the inline image path example
          sed -i \
            -E "s|(refs/tags/)[0-9]+\.[0-9]+\.[0-9]+|\1${TAG}|g" \
            README.md
          # Replace the inline example path segment (e.g. /1.0.4/driver:)
          sed -i \
            -E "s|(gardenlinux-nvidia-installer/)[0-9]+\.[0-9]+\.[0-9]+(/driver)|\1${TAG}\2|g" \
            README.md

      - name: Update supported versions table in README.md
        run: |
          # Capture the output of list_versions.py
          VERSIONS_OUTPUT="$(python3 list_versions.py)"

          # Replace the content between the sentinel comments in README.md
          awk -v new_content="${VERSIONS_OUTPUT}" '
            /<!-- list_versions_output_start -->/ {
              print
              print "```"
              print new_content
              print "```"
              in_block = 1
              next
            }
            /<!-- list_versions_output_end -->/ {
              in_block = 0
              print
              next
            }
            in_block { next }
            { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Update release-version.yaml with new tag
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          echo "${TAG}" > release-version.yaml

      - name: Commit and create PR for updated files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.determine-version.outputs.new_tag }}
        run: |
          source .ci/git_ops.sh
          BRANCH="release-update/${TAG}"
          configure_git_identity "Garden Linux Builder" "gardenlinux@users.noreply.github.com"
          commit_and_push_branch "${BRANCH}" \
            helm/gpu-operator-values.yaml helm/gpu-operator-values-runtime.yaml \
            helm/gpu-operator-gvisor-values.yaml README*.md release-version.yaml
          create_pr "${BRANCH}" main \
            "Update release references for ${TAG}" \
            "Automated PR to update release references for version ${TAG}. Merge PR to create GitHub release."

  build-image:
    needs: [determine-version, update-files]
    uses: ./.github/workflows/build_image.yml
