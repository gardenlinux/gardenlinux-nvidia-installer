name: Release process

on:
  pull_request:
    branches: [main]
    types: [closed]
    paths-ignore:
    # Don't trigger on changes to files that are updated in a separate PR after the release is created
      - 'helm/**'
      - 'README*.md'
      - 'release-version.yaml'
    # Don't trigger on changes to GitHub or CI files, as these do not lead to updated or additional images
      - '.github/**'
      - '.ci/**'
      - 'cdup/**'
      - 'docs/**'

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  determine-version:
    if: github.event.pull_request.merged == true # Only run if the PR was merged - needed to avoid creating a release for every PR that is closed without merging
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine new semver tag
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest semver release tag
          LAST_TAG=$(gh release list --repo "${{ github.repository }}" --json tagName \
            --jq '[.[] | select(.tagName | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName // empty')

          if [[ -z "$LAST_TAG" ]]; then
            echo "No previous release found, starting at 1.0.0"
            MAJOR=1; MINOR=0; PATCH=0
            NEW_TAG="1.0.0"
            echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$LAST_TAG" | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | cut -d. -f3)

          # Collect all commit messages since the last tag
          COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s %b")

          # Extract nvidia_drivers and os_versions lists at last tag and HEAD
          NVIDIA_BEFORE=$(git show "${LAST_TAG}:versions.yaml" 2>/dev/null | \
            awk '/^nvidia_drivers:/{found=1; next} found && /^[^ -]/{exit} found{print}')
          NVIDIA_AFTER=$(git show HEAD:versions.yaml | \
            awk '/^nvidia_drivers:/{found=1; next} found && /^[^ -]/{exit} found{print}')

          OS_BEFORE=$(git show "${LAST_TAG}:versions.yaml" 2>/dev/null | \
            awk '/^os_versions:/{found=1; next} found && /^[^ -]/{exit} found{print}')
          OS_AFTER=$(git show HEAD:versions.yaml | \
            awk '/^os_versions:/{found=1; next} found && /^[^ -]/{exit} found{print}')

          NVIDIA_ADDED=$(diff <(echo "$NVIDIA_BEFORE") <(echo "$NVIDIA_AFTER") | grep -c '^>' || true)
          OS_ADDED=$(diff <(echo "$OS_BEFORE") <(echo "$OS_AFTER") | grep -c '^>' || true)

          # Detect changes outside of os_versions in versions.yaml
          VERSIONS_YAML_BEFORE_NO_OS=$(git show "${LAST_TAG}:versions.yaml" 2>/dev/null | \
             awk '/^os_versions:/{skip=1; next} skip && !/^-/{skip=0} !skip')
          VERSIONS_YAML_AFTER_NO_OS=$(git show HEAD:versions.yaml | \
             awk '/^os_versions:/{skip=1; next} skip && !/^-/{skip=0} !skip')
          VERSIONS_YAML_OTHER_CHANGES=$(diff \
            <(echo "$VERSIONS_YAML_BEFORE_NO_OS") \
            <(echo "$VERSIONS_YAML_AFTER_NO_OS") \
            | grep -c '^>' || true)

          # Count any changed files other than versions.yaml
          OTHER_FILES_CHANGED=$(git diff --name-only "${LAST_TAG}..HEAD" | grep -cv -e '^versions\.yaml$' -e '^.github\/' -e '^.ci\/' -e '^cdup\/' -e '^docs\/' || true)

          if [[ "$NVIDIA_ADDED" -gt 0 ]] || [[ "$OTHER_FILES_CHANGED" -gt 0 ]] || [[ "$VERSIONS_YAML_OTHER_CHANGES" -gt 0 ]]; then
            echo "NVIDIA_ADDED: ${NVIDIA_ADDED}, OTHER_FILES_CHANGED: ${OTHER_FILES_CHANGED}, VERSIONS_YAML_OTHER_CHANGES: ${VERSIONS_YAML_OTHER_CHANGES}"
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="${MAJOR}.${MINOR}.${PATCH}"
          echo "Last tag: ${LAST_TAG} → New tag: ${NEW_TAG}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

  update-files:
    needs: determine-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use a token that allows pushing to protected branches if needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml
       
      - name: Update driver.repository in gpu-operator-values.yaml
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          sed -i "s|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/.*|repository: ghcr.io/gardenlinux/gardenlinux-nvidia-installer/${TAG}|" \
            helm/gpu-operator-values.yaml

      - name: Update release tag in README.md
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          # Replace every refs/tags/<version> URL and the inline image path example
          sed -i \
            -E "s|(refs/tags/)[0-9]+\.[0-9]+\.[0-9]+|\1${TAG}|g" \
            README.md
          # Replace the inline example path segment (e.g. /1.0.4/driver:)
          sed -i \
            -E "s|(gardenlinux-nvidia-installer/)[0-9]+\.[0-9]+\.[0-9]+(/driver)|\1${TAG}\2|g" \
            README.md

      - name: Update supported versions table in README.md
        run: |
          # Capture the output of list_versions.py
          VERSIONS_OUTPUT="$(python3 list_versions.py)"

          # Replace the content between the sentinel comments in README.md
          awk -v new_content="${VERSIONS_OUTPUT}" '
            /<!-- list_versions_output_start -->/ {
              print
              print "```"
              print new_content
              print "```"
              in_block = 1
              next
            }
            /<!-- list_versions_output_end -->/ {
              in_block = 0
              print
              next
            }
            in_block { next }
            { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Update release-version.yaml with new tag
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          echo "${TAG}" > release-version.yaml

      - name: Commit and create PR for updated files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.determine-version.outputs.new_tag }}"
          BRANCH="release-update/${TAG}"
          
          git config user.name "Garden Linux Builder"
          git config user.email "gardenlinux@users.noreply.github.com"
          
          # Check if there are changes to commit
          git add helm/gpu-operator-values.yaml README*.md release-version.yaml
          if git diff --cached --quiet --exit-code; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Create a new branch and commit changes
          git checkout -b "${BRANCH}"
          git commit -m "Update release references for ${TAG}"
          git push -f origin "${BRANCH}"
          
          PR_LINK=$(gh pr create --base main --head ${BRANCH} --title "Update release references for ${TAG}" --body "Automated PR to update release references for version ${TAG}. Merge PR to create GitHub release.")

  build-image:
    needs: [determine-version, update-files]
    uses: ./.github/workflows/build_image.yml
