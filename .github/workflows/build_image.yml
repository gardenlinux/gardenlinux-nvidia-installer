name: Build and Publish Container Images (matrix)

on:
  workflow_call:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  id-token: write
  packages: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
      manifest_matrix: ${{ steps.set-matrix.outputs.manifest_matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install PyYAML and jq
        run: |
          pip install pyyaml
          sudo apt-get install -y jq

      - name: Generate build and manifest matrices
        id: set-matrix
        run: |
          MATRIX_JSON=$(python3 .ci/generate_matrix.py)
          echo "build_matrix=$(echo "$MATRIX_JSON" | jq -c '.build')" >> $GITHUB_OUTPUT
          echo "manifest_matrix=$(echo "$MATRIX_JSON" | jq -c '.manifest')" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build_matrix) }}
    env:
      GL_VERSION: ${{ matrix.os_version }}
      DRIVER_VERSION: ${{ matrix.driver_version }}
      KERNEL_FLAVOR: ${{ matrix.kernel_flavour }}
      TARGET_ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lowercase github.repository
        run: echo "FOLDER_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name as lower case
        shell: bash
        run: echo BRANCH_FOLDER=$(echo "/${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | grep -v ^/main$ | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
        id: extract_branch

      - name: Extract kernel name
        id: extract_kernel
        run: |
          echo "using ghcr.io/gardenlinux/gardenlinux/kmodbuild:${TARGET_ARCH}-${GL_VERSION}"
          KERNEL_NAME=$(docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e KERNEL_FLAVOR="${KERNEL_FLAVOR}" \
            ghcr.io/gardenlinux/gardenlinux/kmodbuild:${TARGET_ARCH}-${GL_VERSION} \
            ./resources/extract_kernel_name.sh "$KERNEL_FLAVOR")
          echo "kernel_name=$KERNEL_NAME"
          echo "kernel_name=$KERNEL_NAME" >> $GITHUB_OUTPUT


      - name: Build and push Docker image
        id: build_image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On main, use the latest release tag matching [0-9].[0-9].[0-9].
          # On a tag build github.ref_name is the tag itself (e.g. "1.2.3").
          # On any other branch it falls back to the branch name.
          RELEASE_TAG=$(gh release list --repo "${{ github.repository }}" --json tagName \
            --jq '[.[] | select(.tagName | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName')
          IMAGE_PATH="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${RELEASE_TAG}/driver"

          TAG="$DRIVER_VERSION-${{ steps.extract_kernel.outputs.kernel_name }}-gardenlinux0"
          if docker manifest inspect "$IMAGE_PATH:$TAG"; then
            echo "Image $IMAGE_PATH:$TAG already exists, skipping build and push."
          else
            make build \
              WORKSPACE_DIR="${{ github.workspace }}" \
              GL_VERSION=$GL_VERSION \
              DRIVER_VERSION=$DRIVER_VERSION \
              KERNEL_FLAVOR=$KERNEL_FLAVOR \
              TARGET_ARCH=$TARGET_ARCH \
              IMAGE_PATH=${IMAGE_PATH}

            TAG1=$(cat "${{ github.workspace }}/tag1")
            TAG2=$(cat "${{ github.workspace }}/tag2")

            docker push $IMAGE_PATH:$TAG1
            docker push $IMAGE_PATH:$TAG2
          fi

  manifest:
    needs: [build, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.manifest_matrix) }}
    env:
      IMAGE_NAME: "driver"
      GL_VERSION: ${{ matrix.os_version }}
      DRIVER_VERSION: ${{ matrix.driver_version }}
      KERNEL_FLAVOR: ${{ matrix.kernel_flavour }}

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase github.repository
        run: echo "FOLDER_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Extract branch name as lower case
        shell: bash
        run: echo BRANCH_FOLDER=$(echo "/${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | grep -v ^/main$ | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
        id: extract_branch

      - name: Extract kernel name (amd64)
        run: |
          KERNEL_NAME=$(docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ghcr.io/gardenlinux/gardenlinux/kmodbuild:amd64-${{ env.GL_VERSION }} \
            ./resources/extract_kernel_name.sh "${{ env.KERNEL_FLAVOR }}")
          echo "KERNEL_NAME=${KERNEL_NAME}" >> $GITHUB_ENV

      - name: Create and push multi-arch manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=$(gh release list --repo "${{ github.repository }}" --json tagName \
            --jq '[.[] | select(.tagName | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName')
          KERNEL_NAME="${{ env.KERNEL_NAME }}"
          KERNEL_VERSION="${KERNEL_NAME%-*}"
          DRIVER_MAJOR_VERS="${{ matrix.driver_version }}"
          DRIVER_MAJOR_VERS="${DRIVER_MAJOR_VERS%%.*}"
          MANIFEST_TAG="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${RELEASE_TAG}/${{ env.IMAGE_NAME }}:${DRIVER_MAJOR_VERS}-${KERNEL_VERSION}-gardenlinux0"
          AMD64_IMAGE="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${RELEASE_TAG}/${{ env.IMAGE_NAME }}:${DRIVER_MAJOR_VERS}-${KERNEL_VERSION}-amd64-gardenlinux0"
          #ARM64_IMAGE="${{ env.REGISTRY }}/${{ env.FOLDER_NAME }}${{ env.BRANCH_FOLDER }}/${RELEASE_TAG}/${{ env.IMAGE_NAME }}:${DRIVER_MAJOR_VERS}-${KERNEL_VERSION}-arm64-gardenlinux0"

          docker manifest create $MANIFEST_TAG $AMD64_IMAGE $ARM64_IMAGE
          docker manifest push $MANIFEST_TAG
